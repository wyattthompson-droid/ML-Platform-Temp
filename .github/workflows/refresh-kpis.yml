name: Refresh KPIs

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub KPIs
        env:
          GH_TOKEN: ${{ secrets.KPI_GITHUB_TOKEN }}
          ORG: apixio
        run: |
          set -e

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          THIRTY_DAYS_AGO=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-30d +%Y-%m-%dT%H:%M:%SZ)
          SIXTY_DAYS_AGO=$(date -u -d '60 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-60d +%Y-%m-%dT%H:%M:%SZ)

          echo "Fetching repos for $ORG..."
          REPOS=$(gh api "/orgs/$ORG/repos?per_page=100&sort=pushed" --paginate --jq '.[].name' 2>/dev/null | head -30)

          CURRENT_PRS=0
          PRIOR_PRS=0
          MODEL_CURRENT=0
          MODEL_PRIOR=0
          TOTAL_MERGE_HOURS=0
          MERGED_COUNT=0
          PRIOR_MERGE_HOURS=0
          PRIOR_MERGED_COUNT=0

          # Initialize PR detail files
          echo '[]' > model-prs.json
          echo '[]' > all-prs.json

          REPO_COUNT=0
          for REPO in $REPOS; do
            echo "Checking $REPO..."
            REPO_COUNT=$((REPO_COUNT + 1))

            # Fetch closed PRs — validate response is an array
            PRS=$(gh api "/repos/$ORG/$REPO/pulls?state=closed&sort=updated&direction=desc&per_page=50" 2>&1 || true)

            # Check if response is a valid JSON array
            IS_ARRAY=$(echo "$PRS" | jq 'if type == "array" then "yes" else "no" end' 2>/dev/null || echo '"no"')
            if [ "$IS_ARRAY" != '"yes"' ]; then
              echo "  Skipping $REPO — API returned non-array (likely auth issue)"
              echo "  Response preview: $(echo "$PRS" | head -c 200)"
              continue
            fi

            PR_COUNT=$(echo "$PRS" | jq 'length')
            echo "  Found $PR_COUNT closed PRs"

            # Current period (last 30 days)
            CURRENT=$(echo "$PRS" | jq --arg since "$THIRTY_DAYS_AGO" --arg until "$NOW" '
              [.[] | select(.merged_at != null and .merged_at >= $since and .merged_at < $until)]
            ')
            COUNT=$(echo "$CURRENT" | jq 'length')
            CURRENT_PRS=$((CURRENT_PRS + COUNT))

            # Save all current PR details
            echo "$CURRENT" | jq --arg repo "$REPO" '
              [.[] | {title: .title, url: .html_url, repo: $repo, author: .user.login, merged_at: .merged_at, created_at: .created_at}]
            ' > /tmp/current_prs.json
            jq -s '.[0] + .[1]' all-prs.json /tmp/current_prs.json > /tmp/all_merged.json && mv /tmp/all_merged.json all-prs.json

            # Model-related PRs (current)
            MODEL_COUNT=$(echo "$CURRENT" | jq '
              [.[] | select(
                (.title | test("model|checkpoint|artifact|weight|training|fine.?tun"; "i")) or
                ((.body // "") | test("model|checkpoint|artifact|weight|training|fine.?tun"; "i"))
              )] | length
            ')
            MODEL_CURRENT=$((MODEL_CURRENT + MODEL_COUNT))

            # Save model PR details
            echo "$CURRENT" | jq --arg repo "$REPO" '
              [.[] | select(
                (.title | test("model|checkpoint|artifact|weight|training|fine.?tun"; "i")) or
                ((.body // "") | test("model|checkpoint|artifact|weight|training|fine.?tun"; "i"))
              ) | {title: .title, url: .html_url, repo: $repo, author: .user.login, merged_at: .merged_at, created_at: .created_at}]
            ' > /tmp/model_prs.json
            jq -s '.[0] + .[1]' model-prs.json /tmp/model_prs.json > /tmp/model_merged.json && mv /tmp/model_merged.json model-prs.json

            # Merge time (current)
            MERGE_DATA=$(echo "$CURRENT" | jq '
              [.[] | {
                hours: (((.merged_at | fromdateiso8601) - (.created_at | fromdateiso8601)) / 3600)
              }]
            ')
            PERIOD_HOURS=$(echo "$MERGE_DATA" | jq '[.[].hours] | add // 0')
            PERIOD_COUNT=$(echo "$MERGE_DATA" | jq 'length')
            TOTAL_MERGE_HOURS=$(echo "$TOTAL_MERGE_HOURS + $PERIOD_HOURS" | bc)
            MERGED_COUNT=$((MERGED_COUNT + PERIOD_COUNT))

            # Prior period (30-60 days ago)
            PRIOR=$(echo "$PRS" | jq --arg since "$SIXTY_DAYS_AGO" --arg until "$THIRTY_DAYS_AGO" '
              [.[] | select(.merged_at != null and .merged_at >= $since and .merged_at < $until)]
            ')
            PCOUNT=$(echo "$PRIOR" | jq 'length')
            PRIOR_PRS=$((PRIOR_PRS + PCOUNT))

            # Model-related PRs (prior)
            PRIOR_MODEL_COUNT=$(echo "$PRIOR" | jq '
              [.[] | select(
                (.title | test("model|checkpoint|artifact|weight|training|fine.?tun"; "i")) or
                ((.body // "") | test("model|checkpoint|artifact|weight|training|fine.?tun"; "i"))
              )] | length
            ')
            MODEL_PRIOR=$((MODEL_PRIOR + PRIOR_MODEL_COUNT))

            # Merge time (prior)
            PRIOR_MERGE_DATA=$(echo "$PRIOR" | jq '
              [.[] | {
                hours: (((.merged_at | fromdateiso8601) - (.created_at | fromdateiso8601)) / 3600)
              }]
            ')
            PRIOR_PERIOD_HOURS=$(echo "$PRIOR_MERGE_DATA" | jq '[.[].hours] | add // 0')
            PRIOR_PERIOD_COUNT=$(echo "$PRIOR_MERGE_DATA" | jq 'length')
            PRIOR_MERGE_HOURS=$(echo "$PRIOR_MERGE_HOURS + $PRIOR_PERIOD_HOURS" | bc)
            PRIOR_MERGED_COUNT=$((PRIOR_MERGED_COUNT + PRIOR_PERIOD_COUNT))
          done

          # Calculate averages
          if [ "$MERGED_COUNT" -gt 0 ]; then
            AVG_MERGE_HOURS=$(echo "scale=0; $TOTAL_MERGE_HOURS / $MERGED_COUNT" | bc)
          else
            AVG_MERGE_HOURS="null"
          fi

          if [ "$PRIOR_MERGED_COUNT" -gt 0 ]; then
            PRIOR_AVG_MERGE_HOURS=$(echo "scale=0; $PRIOR_MERGE_HOURS / $PRIOR_MERGED_COUNT" | bc)
          else
            PRIOR_AVG_MERGE_HOURS="null"
          fi

          UPDATED=$(date -u +"%Y-%m-%d %H:%M UTC")

          # --- DS Velocity Metrics ---
          # Fetch CI first-pass rate and push-to-deploy time from ml-daqari GitHub Actions
          echo "Fetching DS velocity metrics from ml-daqari..."

          # Get workflow runs from the last 30 days (feature branch deploys)
          RUNS_30D=$(gh api "/repos/$ORG/ml-daqari/actions/runs?created=>=$THIRTY_DAYS_AGO&per_page=100" 2>/dev/null || echo '{"workflow_runs":[]}')

          # CI first-pass rate: count feature branch runs, check how many succeeded on first attempt
          # Group by head_sha — if the first run for a sha succeeded, it's a first-pass success
          CI_STATS=$(echo "$RUNS_30D" | jq '
            [.workflow_runs[] | select(.name == "Deploy Feature Branch")] |
            group_by(.head_sha) |
            map({sha: .[0].head_sha, first_result: (sort_by(.created_at) | .[0].conclusion)}) |
            {total: length, passed: [.[] | select(.first_result == "success")] | length}
          ')
          CI_TOTAL=$(echo "$CI_STATS" | jq '.total')
          CI_PASSED=$(echo "$CI_STATS" | jq '.passed')
          if [ "$CI_TOTAL" -gt 0 ]; then
            CI_FIRST_PASS=$(echo "scale=0; $CI_PASSED * 100 / $CI_TOTAL" | bc)
          else
            CI_FIRST_PASS="null"
          fi

          # Push to deploy time: average minutes from run created to run completed (successful runs only)
          DEPLOY_STATS=$(echo "$RUNS_30D" | jq '
            [.workflow_runs[] | select(.name == "Deploy Feature Branch" and .conclusion == "success") |
              {minutes: ((.updated_at | fromdateiso8601) - (.created_at | fromdateiso8601)) / 60}
            ] | if length > 0 then {avg: ([.[].minutes] | add / length), count: length} else {avg: null, count: 0} end
          ')
          PUSH_TO_DEPLOY=$(echo "$DEPLOY_STATS" | jq '.avg | if . != null then (. * 10 | round / 10) else null end')

          # Prior period CI stats (30-60 days ago)
          RUNS_PRIOR=$(gh api "/repos/$ORG/ml-daqari/actions/runs?created=$SIXTY_DAYS_AGO..$THIRTY_DAYS_AGO&per_page=100" 2>/dev/null || echo '{"workflow_runs":[]}')
          CI_STATS_PRIOR=$(echo "$RUNS_PRIOR" | jq '
            [.workflow_runs[] | select(.name == "Deploy Feature Branch")] |
            group_by(.head_sha) |
            map({sha: .[0].head_sha, first_result: (sort_by(.created_at) | .[0].conclusion)}) |
            {total: length, passed: [.[] | select(.first_result == "success")] | length}
          ')
          CI_TOTAL_PRIOR=$(echo "$CI_STATS_PRIOR" | jq '.total')
          CI_PASSED_PRIOR=$(echo "$CI_STATS_PRIOR" | jq '.passed')
          if [ "$CI_TOTAL_PRIOR" -gt 0 ]; then
            CI_FIRST_PASS_PRIOR=$(echo "scale=0; $CI_PASSED_PRIOR * 100 / $CI_TOTAL_PRIOR" | bc)
          else
            CI_FIRST_PASS_PRIOR="null"
          fi

          DEPLOY_STATS_PRIOR=$(echo "$RUNS_PRIOR" | jq '
            [.workflow_runs[] | select(.name == "Deploy Feature Branch" and .conclusion == "success") |
              {minutes: ((.updated_at | fromdateiso8601) - (.created_at | fromdateiso8601)) / 60}
            ] | if length > 0 then {avg: ([.[].minutes] | add / length), count: length} else {avg: null, count: 0} end
          ')
          PUSH_TO_DEPLOY_PRIOR=$(echo "$DEPLOY_STATS_PRIOR" | jq '.avg | if . != null then (. * 10 | round / 10) else null end')

          # PR review wait time: hours from PR created to first review
          echo "Fetching PR review wait times..."
          TOTAL_REVIEW_WAIT=0
          REVIEW_COUNT=0
          PRIOR_REVIEW_WAIT=0
          PRIOR_REVIEW_COUNT=0

          for REPO in $REPOS; do
            # Get merged PRs with reviews
            MERGED_PRS=$(gh api "/repos/$ORG/$REPO/pulls?state=closed&sort=updated&direction=desc&per_page=30" 2>/dev/null || echo '[]')
            IS_ARRAY=$(echo "$MERGED_PRS" | jq 'if type == "array" then "yes" else "no" end' 2>/dev/null || echo '"no"')
            if [ "$IS_ARRAY" != '"yes"' ]; then continue; fi

            CURRENT_MERGED=$(echo "$MERGED_PRS" | jq --arg since "$THIRTY_DAYS_AGO" '[.[] | select(.merged_at != null and .merged_at >= $since)]')
            PR_NUMBERS=$(echo "$CURRENT_MERGED" | jq -r '.[].number')

            for PR_NUM in $PR_NUMBERS; do
              REVIEWS=$(gh api "/repos/$ORG/$REPO/pulls/$PR_NUM/reviews?per_page=1" 2>/dev/null || echo '[]')
              FIRST_REVIEW=$(echo "$REVIEWS" | jq -r '.[0].submitted_at // empty' 2>/dev/null)
              PR_CREATED=$(echo "$CURRENT_MERGED" | jq -r --argjson num "$PR_NUM" '.[] | select(.number == $num) | .created_at')
              if [ -n "$FIRST_REVIEW" ] && [ -n "$PR_CREATED" ]; then
                WAIT_HRS=$(echo "$REVIEWS" | jq --arg created "$PR_CREATED" '
                  ((.[0].submitted_at | fromdateiso8601) - ($created | fromdateiso8601)) / 3600
                ' 2>/dev/null || echo "0")
                if [ "$WAIT_HRS" != "0" ] && [ "$WAIT_HRS" != "null" ]; then
                  TOTAL_REVIEW_WAIT=$(echo "$TOTAL_REVIEW_WAIT + $WAIT_HRS" | bc)
                  REVIEW_COUNT=$((REVIEW_COUNT + 1))
                fi
              fi
            done
          done

          if [ "$REVIEW_COUNT" -gt 0 ]; then
            AVG_REVIEW_WAIT=$(echo "scale=0; $TOTAL_REVIEW_WAIT / $REVIEW_COUNT" | bc)
          else
            AVG_REVIEW_WAIT="null"
          fi

          echo "CI First-Pass: ${CI_FIRST_PASS}%, Push-to-Deploy: ${PUSH_TO_DEPLOY}m, Review Wait: ${AVG_REVIEW_WAIT}h"

          # Update kpi-data.json
          jq \
            --argjson current_prs "$CURRENT_PRS" \
            --argjson prior_prs "$PRIOR_PRS" \
            --argjson model_current "$MODEL_CURRENT" \
            --argjson model_prior "$MODEL_PRIOR" \
            --argjson avg_merge "$AVG_MERGE_HOURS" \
            --argjson prior_merge "$PRIOR_AVG_MERGE_HOURS" \
            --argjson ci_first_pass "$CI_FIRST_PASS" \
            --argjson ci_first_pass_prior "$CI_FIRST_PASS_PRIOR" \
            --argjson push_deploy "$PUSH_TO_DEPLOY" \
            --argjson push_deploy_prior "$PUSH_TO_DEPLOY_PRIOR" \
            --argjson review_wait "$AVG_REVIEW_WAIT" \
            --arg updated "$UPDATED" \
            '
            .northstar[0].value = $model_current |
            .northstar[0].previousValue = $model_prior |
            .northstar[0].lastUpdated = $updated |
            (.leading[] | select(.id == "num-prs")).value = $current_prs |
            (.leading[] | select(.id == "num-prs")).previousValue = $prior_prs |
            (.leading[] | select(.id == "num-prs")).lastUpdated = $updated |
            (.leading[] | select(.id == "deployment-time")).value = $avg_merge |
            (.leading[] | select(.id == "deployment-time")).previousValue = $prior_merge |
            (.leading[] | select(.id == "deployment-time")).lastUpdated = $updated |
            (.leading[] | select(.id == "ci-first-pass-rate")).value = $ci_first_pass |
            (.leading[] | select(.id == "ci-first-pass-rate")).previousValue = $ci_first_pass_prior |
            (.leading[] | select(.id == "ci-first-pass-rate")).lastUpdated = $updated |
            (.leading[] | select(.id == "push-to-deploy-time")).value = $push_deploy |
            (.leading[] | select(.id == "push-to-deploy-time")).previousValue = $push_deploy_prior |
            (.leading[] | select(.id == "push-to-deploy-time")).lastUpdated = $updated |
            (.leading[] | select(.id == "pr-review-wait-time")).value = $review_wait |
            (.leading[] | select(.id == "pr-review-wait-time")).lastUpdated = $updated
            ' kpi-data.json > kpi-data.tmp && mv kpi-data.tmp kpi-data.json

          # Sort detail files by merge date (newest first)
          jq 'sort_by(.merged_at) | reverse' model-prs.json > /tmp/sorted.json && mv /tmp/sorted.json model-prs.json
          jq 'sort_by(.merged_at) | reverse' all-prs.json > /tmp/sorted.json && mv /tmp/sorted.json all-prs.json

          echo "Checked $REPO_COUNT repos"
          echo "Done! PRs: $CURRENT_PRS (prior: $PRIOR_PRS), Model updates: $MODEL_CURRENT, Avg merge: ${AVG_MERGE_HOURS}h"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kpi-data.json model-prs.json all-prs.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh KPI data $(date -u +%Y-%m-%d)"
          git push
